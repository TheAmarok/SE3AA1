<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Personen</title>
    <style>
        table th, table td {
            padding: 12px 15px;
            text-align: left;
        }
    </style>
</head>
<body>

    <table style = "width: 100%;" cellpadding="">

        <tr>
            <th>Name</th>
            <th>Anrede</th>
            <th>Kontakt</th>
            <th>Beschreibung</th>
            <th>Aktionen</th>
        </tr>

        <tr th:each="person : ${personen}">

            <td th:text="${person.name}"></td>

            <td th:text="${person.anrede}"></td>

            <td th:text="${person.kontaktdaten}"></td>

            <td th:text="${person.beschreibung}"></td>

            <td>
                <button>
                    <a th:href="@{/personen/bearbeiten/{id}(id=${person.person_id})}">
                        Bearbeiten
                    </a>
                </button>
                <button onclick="return confirm('Wirklich löschen?')">
                    <a th:href="@{/personen/loeschen/{id}(id=${person.person_id})}">
                        Löschen
                    </a>
                </button>
            </td>

        </tr>

    </table>

    <button>
        <a th:href="@{/personen/neue-person}">
            Person Hinzufügen
        </a>
    </button>
    <button>
        <a th:href="@{/}">
            Home
        </a>
    </button>

</body>
</html>
