<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Fehler</title>
</head>
<body>
    <h1>
        Ein Fehler ist aufgetreten.
    </h1>
    <!--/*@thymesVar id="error" type="java.lang.String"*/-->

        <p th:text="${error}"></p>
    </div>

    <button>
        <a th:href="@{/}">
            Home
        </a>
    </button>

</body>
</html>
