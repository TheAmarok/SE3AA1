<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Übersicht</title>
</head>
<body>
    <h1>Bereiche</h1>


    <div th:each="bereich : ${bereiche}">

        <h2 th:text="${bereich.name}"></h2>

        <p>
            <strong>Kontakt:</strong>
            <span th:text="${bereich.kontaktdaten}"></span>
        </p>

        <p>
            <strong>Beschreibung:</strong>
            <span th:text="${bereich.beschreibung}"></span>
        </p>


        <h3>Personen:</h3>


        <ul>

            <li th:each="person : ${bereich.personen}">
                (
                <span th:text="${person.anrede}"></span>
                )
                <span th:text="${person.name}"></span>
                -
                <span th:text="${person.beschreibung}"></span>
                -
                <span th:text="${person.kontaktdaten}"></span>

            </li>

        </ul>


        <hr>

    </div>

    <button>
        <a th:href="@{/personen}">
            Personen
        </a>
    </button>
    <button>
        <a th:href="@{/bereiche}">
            Bereiche
        </a>
    </button>

</body>
</html>
