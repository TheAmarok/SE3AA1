<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bereich Angeben</title>
</head>
<body>

<form th:action="@{/bereiche/speichern}"
      th:object="${bereich}"
      method="post">

    <input type="hidden" th:field="*{bereich_id}">

    <input th:field="*{name}">
    <input th:field="*{kontaktdaten}">
    <input th:field="*{beschreibung}">

    <button type="submit" >
        Speichern
    </button>

</form>

</body>
</html>
